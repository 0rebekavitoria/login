<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <img src="lolla.png" class="girl">

    <div class="login">

        <h1>Bem-Vindo</h1>
        <h2>Faça login para continuar</h2>

        <div class="campo">
            <label>Email</label>
            <input type="email" placeholder="seu@email.com">
        </div>

        <div class="campo">
            <label>Senha</label>
            <input type="password" placeholder="••••••••">
        </div>

        <div class="opcoes">
            <div>
                <input type="checkbox">
                <span>Lembrar-me</span>
            </div>

            <a href="#">Esqueceu a senha?</a>
        </div>

        <button>Entrar</button>

        <p>
            Não tem uma conta?
            <a href="#">Cadastre-se</a>
        </p>

    </div>

    <img src="charlie.png" class="boy">

</div>

</body>
</html>
